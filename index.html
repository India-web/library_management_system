<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LibraFlow | Modern Library Management</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f7fc;
      color: #1a2c3e;
      line-height: 1.5;
    }

    /* modern glassmorphism & shadows */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* navigation */
    .navbar {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02), 0 1px 0 rgba(0, 0, 0, 0.05);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-wrapper {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 1rem 0;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #2C7DA0, #1F5068);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .logo i {
      background: none;
      -webkit-background-clip: unset;
      background-clip: unset;
      color: #2C7DA0;
      margin-right: 6px;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      font-weight: 500;
      color: #2c3e4e;
      transition: 0.2s ease;
      font-size: 1rem;
    }

    .nav-links a:hover, .nav-links a.active {
      color: #2C7DA0;
      border-bottom: 2px solid #2C7DA0;
      padding-bottom: 4px;
    }

    /* buttons & cards */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #2C7DA0;
      color: white;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid #2C7DA0;
      color: #2C7DA0;
    }

    .btn-outline:hover {
      background: #2C7DA0;
      color: white;
    }

    .btn:hover {
      background: #1f5e7a;
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(44,125,160,0.2);
    }

    .hero, .section {
      padding: 3rem 0 4rem;
    }

    .hero-grid {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 3rem;
    }

    .hero-text {
      flex: 1;
    }

    .hero-text h1 {
      font-size: 3.2rem;
      font-weight: 700;
      line-height: 1.2;
      background: linear-gradient(135deg, #1F5068, #2C7DA0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1.2rem;
    }

    .hero-stats {
      display: flex;
      gap: 2rem;
      margin: 2rem 0;
    }

    .stat-card {
      background: white;
      border-radius: 32px;
      padding: 0.8rem 1.8rem;
      box-shadow: 0 6px 14px rgba(0,0,0,0.02);
      text-align: center;
    }

    /* book grid */
    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.8rem;
      margin-top: 2rem;
    }

    .book-card {
      background: white;
      border-radius: 28px;
      padding: 1.5rem;
      transition: all 0.25s;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.03);
      border: 1px solid rgba(0,0,0,0.05);
    }

    .book-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 24px 36px -12px rgba(0,0,0,0.15);
    }

    .book-icon {
      font-size: 2.4rem;
      color: #2C7DA0;
      margin-bottom: 1rem;
    }

    .book-title {
      font-weight: 700;
      font-size: 1.2rem;
    }

    .book-author {
      color: #5a6e7c;
      font-size: 0.85rem;
      margin: 6px 0;
    }

    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-top: 12px;
    }

    .available {
      background: #dff9e6;
      color: #1e6f3f;
    }

    .borrowed {
      background: #ffe6e2;
      color: #b13e2d;
    }

    form {
      background: white;
      padding: 2rem;
      border-radius: 32px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.05);
      max-width: 600px;
      margin: 2rem auto;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      font-weight: 500;
      display: block;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 12px 16px;
      border-radius: 60px;
      border: 1px solid #cddfe7;
      font-family: inherit;
      transition: 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #2C7DA0;
      box-shadow: 0 0 0 3px rgba(44,125,160,0.1);
    }

    .member-list, .transaction-list {
      background: white;
      border-radius: 28px;
      padding: 1rem;
      margin-top: 1rem;
    }

    .member-item, .transaction-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #edf2f7;
      padding: 1rem;
    }

    footer {
      background: #0f2c38;
      color: #cbd5e1;
      padding: 2rem 0;
      margin-top: 3rem;
      text-align: center;
    }

    @media (max-width: 768px) {
      .nav-wrapper {
        flex-direction: column;
        gap: 1rem;
      }
      .hero-text h1 {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container nav-wrapper">
    <div class="logo">
      <i class="fas fa-book-open"></i> LibraFlow
    </div>
    <ul class="nav-links" id="nav-links">
      <li><a href="#" data-page="home" class="active">🏠 Home</a></li>
      <li><a href="#" data-page="catalog">📚 Catalog</a></li>
      <li><a href="#" data-page="members">👥 Members</a></li>
      <li><a href="#" data-page="transactions">🔄 Transactions</a></li>
    </ul>
  </div>
</nav>

<main id="app">
  <!-- pages will be injected here dynamically -->
</main>

<footer>
  <div class="container">
    <p>© 2025 LibraFlow — Modern Library Management System | Empowering knowledge, one click away.</p>
  </div>
</footer>

<script>
  // ------------------------- DATA MODELS (LocalStorage) -------------------------
  // default books, members, transactions if empty
  let books = [
    { id: "b1", title: "The Midnight Library", author: "Matt Haig", isbn: "978-0525559474", available: true },
    { id: "b2", title: "Project Hail Mary", author: "Andy Weir", isbn: "978-0593135204", available: false },
    { id: "b3", title: "Dune", author: "Frank Herbert", isbn: "978-0441172719", available: true },
    { id: "b4", title: "Atomic Habits", author: "James Clear", isbn: "978-0735211292", available: true },
    { id: "b5", title: "Klara and the Sun", author: "Kazuo Ishiguro", isbn: "978-0571364879", available: false }
  ];

  let members = [
    { id: "m1", name: "Emma Johnson", email: "emma@example.com", membershipDate: "2024-01-15" },
    { id: "m2", name: "Liam Chen", email: "liam.chen@example.com", membershipDate: "2024-06-10" },
    { id: "m3", name: "Sofia Rodriguez", email: "sofia@example.com", membershipDate: "2025-02-01" }
  ];

  let transactions = [
    { id: "t1", bookId: "b2", memberId: "m1", issueDate: "2025-04-01", dueDate: "2025-04-15", returned: false },
    { id: "t2", bookId: "b5", memberId: "m2", issueDate: "2025-05-10", dueDate: "2025-05-25", returned: false }
  ];

  function loadData() {
    const storedBooks = localStorage.getItem("libraflow_books");
    const storedMembers = localStorage.getItem("libraflow_members");
    const storedTransactions = localStorage.getItem("libraflow_transactions");
    if(storedBooks) books = JSON.parse(storedBooks);
    if(storedMembers) members = JSON.parse(storedMembers);
    if(storedTransactions) transactions = JSON.parse(storedTransactions);
  }

  function saveData() {
    localStorage.setItem("libraflow_books", JSON.stringify(books));
    localStorage.setItem("libraflow_members", JSON.stringify(members));
    localStorage.setItem("libraflow_transactions", JSON.stringify(transactions));
  }

  // helper to get book by id
  function getBook(id) { return books.find(b => b.id === id); }
  function getMember(id) { return members.find(m => m.id === id); }
  
  // update book availability based on active transactions
  function syncAvailability() {
    // reset all books to true first
    books.forEach(book => { book.available = true; });
    transactions.forEach(tx => {
      if(!tx.returned) {
        const bk = books.find(b => b.id === tx.bookId);
        if(bk) bk.available = false;
      }
    });
    saveData();
  }

  function issueBook(bookId, memberId, dueDate) {
    const book = books.find(b => b.id === bookId);
    const member = members.find(m => m.id === memberId);
    if(!book || !member) return { success: false, msg: "Invalid book or member" };
    if(!book.available) return { success: false, msg: "Book is currently borrowed" };
    const newId = "tx"+ Date.now();
    const today = new Date().toISOString().slice(0,10);
    transactions.push({
      id: newId, bookId, memberId, issueDate: today, dueDate: dueDate, returned: false
    });
    book.available = false;
    saveData();
    return { success: true, msg: "Book issued successfully" };
  }

  function returnBook(transactionId) {
    const tx = transactions.find(t => t.id === transactionId);
    if(!tx || tx.returned) return false;
    tx.returned = true;
    const book = books.find(b => b.id === tx.bookId);
    if(book) book.available = true;
    saveData();
    return true;
  }

  function addBook(bookData) {
    const newId = "b"+ Date.now();
    const newBook = { id: newId, ...bookData, available: true };
    books.push(newBook);
    saveData();
    return newBook;
  }

  function addMember(memberData) {
    const newId = "m"+ Date.now();
    const newMember = { id: newId, ...memberData };
    members.push(newMember);
    saveData();
    return newMember;
  }

  // ------------------------- UI RENDERING (modern pages) -------------------------
  let currentPage = "home";

  function renderHome() {
    syncAvailability();
    const totalBooks = books.length;
    const availableBooks = books.filter(b => b.available).length;
    const activeMembers = members.length;
    const activeLoans = transactions.filter(t => !t.returned).length;
    const recentBooks = [...books].slice(0, 4);
    return `
      <div class="container hero">
        <div class="hero-grid">
          <div class="hero-text">
            <h1>Library intelligence,<br>reimagined.</h1>
            <p>Seamless book tracking, digital catalog, member management & real-time transactions — all in one modern dashboard.</p>
            <div class="hero-stats">
              <div class="stat-card"><strong>${totalBooks}</strong><br>Total Books</div>
              <div class="stat-card"><strong>${availableBooks}</strong><br>Available</div>
              <div class="stat-card"><strong>${activeMembers}</strong><br>Members</div>
              <div class="stat-card"><strong>${activeLoans}</strong><br>Active Loans</div>
            </div>
            <a href="#" data-nav="catalog" class="btn" id="exploreBtn"><i class="fas fa-search"></i> Explore Catalog</a>
          </div>
          <div style="flex:1; text-align:center;">
            <i class="fas fa-landmark" style="font-size: 10rem; color:#2C7DA0; opacity:0.8;"></i>
          </div>
        </div>
      </div>
      <div class="container section">
        <h2 style="margin-bottom:1rem;">📖 Recently Added / Featured</h2>
        <div class="book-grid">
          ${recentBooks.map(book => `
            <div class="book-card">
              <div class="book-icon"><i class="fas fa-book"></i></div>
              <div class="book-title">${escapeHtml(book.title)}</div>
              <div class="book-author">by ${escapeHtml(book.author)}</div>
              <span class="status ${book.available ? 'available' : 'borrowed'}">${book.available ? 'Available' : 'Borrowed'}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  function renderCatalog() {
    syncAvailability();
    return `
      <div class="container section">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
          <h2><i class="fas fa-book"></i> Library Catalog</h2>
          <button id="showAddBookModalBtn" class="btn" style="background:#2d6a4f;"><i class="fas fa-plus"></i> Add New Book</button>
        </div>
        <div class="book-grid" id="catalogGrid">
          ${books.map(book => `
            <div class="book-card">
              <div class="book-icon"><i class="fas fa-book-open"></i></div>
              <div class="book-title">${escapeHtml(book.title)}</div>
              <div class="book-author">${escapeHtml(book.author)}</div>
              <div><small>ISBN: ${book.isbn || 'N/A'}</small></div>
              <span class="status ${book.available ? 'available' : 'borrowed'}">${book.available ? 'Available' : 'Borrowed'}</span>
              <div style="margin-top:12px;">
                ${book.available ? `<button class="btn btn-outline quick-issue" data-bookid="${book.id}" style="padding:6px 14px; font-size:0.75rem;">Issue</button>` : `<button class="btn quick-return" data-bookid="${book.id}" style="background:#b13e2d; padding:6px 14px; font-size:0.75rem;">Return</button>`}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
      <!-- modal for add book (simple inline dialog) -->
      <div id="addBookModal" style="display:none; position:fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5); justify-content:center;align-items:center;z-index:1000;">
        <div style="background:white; max-width:450px; border-radius:32px; padding:2rem;">
          <h3>Add New Book</h3>
          <div class="form-group"><label>Title</label><input id="newBookTitle" placeholder="Book Title"></div>
          <div class="form-group"><label>Author</label><input id="newBookAuthor" placeholder="Author"></div>
          <div class="form-group"><label>ISBN</label><input id="newBookIsbn" placeholder="ISBN"></div>
          <div style="display:flex; gap:1rem; justify-content:flex-end;">
            <button class="btn-outline btn" id="closeModalBtn">Cancel</button>
            <button class="btn" id="confirmAddBookBtn">Add Book</button>
          </div>
        </div>
      </div>
    `;
  }

  function renderMembers() {
    return `
      <div class="container section">
        <div style="display:flex; justify-content:space-between;">
          <h2><i class="fas fa-users"></i> Library Members</h2>
          <button id="showAddMemberBtn" class="btn"><i class="fas fa-user-plus"></i> Register Member</button>
        </div>
        <div class="member-list" id="memberListContainer">
          ${members.map(m => `
            <div class="member-item">
              <div><strong>${escapeHtml(m.name)}</strong><br><small>${escapeHtml(m.email)}</small><br><small>Member since ${m.membershipDate}</small></div>
              <div><span class="status available">Active</span></div>
            </div>
          `).join('')}
        </div>
      </div>
      <div id="addMemberModal" style="display:none; position:fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5); justify-content:center;align-items:center;z-index:1000;">
        <div style="background:white; max-width:450px; border-radius:32px; padding:2rem;">
          <h3>New Member Registration</h3>
          <div class="form-group"><label>Full Name</label><input id="memberName" placeholder="Name"></div>
          <div class="form-group"><label>Email</label><input id="memberEmail" placeholder="Email"></div>
          <div class="form-group"><label>Membership Date</label><input id="memberDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
          <div style="display:flex; gap:1rem; justify-content:flex-end;">
            <button class="btn-outline btn" id="closeMemberModalBtn">Cancel</button>
            <button class="btn" id="confirmAddMemberBtn">Register</button>
          </div>
        </div>
      </div>
    `;
  }

  function renderTransactions() {
    syncAvailability();
    const activeTx = transactions.filter(t => !t.returned);
    const historyTx = transactions.filter(t => t.returned);
    return `
      <div class="container section">
        <h2><i class="fas fa-exchange-alt"></i> Issue & Returns</h2>
        <div style="background:white; border-radius:28px; padding:1.5rem; margin-bottom:2rem;">
          <h3>➕ Issue a Book</h3>
          <div style="display:flex; flex-wrap:wrap; gap:1rem;">
            <select id="issueBookSelect" style="flex:1;">
              <option value="">-- Select Book (Available only) --</option>
              ${books.filter(b=>b.available).map(b=>`<option value="${b.id}">${escapeHtml(b.title)}</option>`).join('')}
            </select>
            <select id="issueMemberSelect" style="flex:1;">
              <option value="">-- Select Member --</option>
              ${members.map(m=>`<option value="${m.id}">${escapeHtml(m.name)}</option>`).join('')}
            </select>
            <input type="date" id="dueDateInput" value="${new Date(Date.now()+14*86400000).toISOString().slice(0,10)}" style="flex:0.8;">
            <button id="performIssueBtn" class="btn">Issue Book</button>
          </div>
          <div id="issueMessage" style="margin-top:12px;"></div>
        </div>
        <h3>📌 Active Loans</h3>
        <div class="transaction-list">
          ${activeTx.length === 0 ? '<p>No active loans.</p>' : activeTx.map(tx => {
            const book = getBook(tx.bookId);
            const member = getMember(tx.memberId);
            return `<div class="transaction-item">
              <div><strong>${book ? book.title : 'Deleted book'}</strong> issued to ${member ? member.name : 'member'}<br><small>Due: ${tx.dueDate}</small></div>
              <button class="btn-outline returnTxBtn" data-txid="${tx.id}" style="padding:6px 18px;">Return Book</button>
            </div>`;
          }).join('')}
        </div>
        <h3 style="margin-top:2rem;">📜 Transaction History</h3>
        <div class="transaction-list">
          ${historyTx.length === 0 ? '<p>No past transactions.</p>' : historyTx.map(tx => {
            const book = getBook(tx.bookId);
            const member = getMember(tx.memberId);
            return `<div class="transaction-item">
              <div><strong>${book ? book.title : 'Book'}</strong> returned by ${member ? member.name : 'member'} <br><small>Issued: ${tx.issueDate} | Returned ✅</small></div>
            </div>`;
          }).join('')}
        </div>
      </div>
    `;
  }

  // global escape
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  function renderPage(page) {
    const app = document.getElementById('app');
    if(page === 'home') app.innerHTML = renderHome();
    else if(page === 'catalog') app.innerHTML = renderCatalog();
    else if(page === 'members') app.innerHTML = renderMembers();
    else if(page === 'transactions') app.innerHTML = renderTransactions();
    attachPageEvents(page);
    // sync active nav class
    document.querySelectorAll('.nav-links a').forEach(link => {
      const linkPage = link.getAttribute('data-page');
      if(linkPage === page) link.classList.add('active');
      else link.classList.remove('active');
    });
  }

  function attachPageEvents(page) {
    if(page === 'catalog') {
      const addBtn = document.getElementById('showAddBookModalBtn');
      const modal = document.getElementById('addBookModal');
      if(addBtn) addBtn.onclick = () => { if(modal) modal.style.display = 'flex'; };
      const closeModal = document.getElementById('closeModalBtn');
      if(closeModal) closeModal.onclick = () => { if(modal) modal.style.display = 'none'; };
      const confirmAdd = document.getElementById('confirmAddBookBtn');
      if(confirmAdd) confirmAdd.onclick = () => {
        const title = document.getElementById('newBookTitle').value.trim();
        const author = document.getElementById('newBookAuthor').value.trim();
        const isbn = document.getElementById('newBookIsbn').value.trim();
        if(!title || !author) { alert("Title and Author required"); return; }
        addBook({ title, author, isbn: isbn || "N/A", available: true });
        if(modal) modal.style.display = 'none';
        renderPage('catalog');
      };
      document.querySelectorAll('.quick-issue').forEach(btn => {
        btn.onclick = (e) => { const bid = btn.getAttribute('data-bookid'); showIssueForBook(bid); };
      });
      document.querySelectorAll('.quick-return').forEach(btn => {
        btn.onclick = () => { 
          const bid = btn.getAttribute('data-bookid');
          const tx = transactions.find(t => t.bookId === bid && !t.returned);
          if(tx && returnBook(tx.id)) { renderPage('catalog'); alert("Book returned successfully"); }
          else alert("Could not return book");
        };
      });
    }
    if(page === 'members') {
      const showModalBtn = document.getElementById('showAddMemberBtn');
      const modalMember = document.getElementById('addMemberModal');
      if(showModalBtn) showModalBtn.onclick = () => { if(modalMember) modalMember.style.display = 'flex'; };
      const closeMember = document.getElementById('closeMemberModalBtn');
      if(closeMember) closeMember.onclick = () => { if(modalMember) modalMember.style.display = 'none'; };
      const confirmMember = document.getElementById('confirmAddMemberBtn');
      if(confirmMember) confirmMember.onclick = () => {
        const name = document.getElementById('memberName').value.trim();
        const email = document.getElementById('memberEmail').value.trim();
        const mdate = document.getElementById('memberDate').value;
        if(!name || !email) { alert("Name and Email required"); return; }
        addMember({ name, email, membershipDate: mdate || new Date().toISOString().slice(0,10) });
        if(modalMember) modalMember.style.display = 'none';
        renderPage('members');
      };
    }
    if(page === 'transactions') {
      const issueBtn = document.getElementById('performIssueBtn');
      if(issueBtn) issueBtn.onclick = () => {
        const bookId = document.getElementById('issueBookSelect').value;
        const memberId = document.getElementById('issueMemberSelect').value;
        const dueDate = document.getElementById('dueDateInput').value;
        if(!bookId || !memberId) { document.getElementById('issueMessage').innerHTML = '<span style="color:red;">Select book and member</span>'; return; }
        const res = issueBook(bookId, memberId, dueDate);
        if(res.success) { renderPage('transactions'); }
        else { document.getElementById('issueMessage').innerHTML = `<span style="color:red;">${res.msg}</span>`; }
      };
      document.querySelectorAll('.returnTxBtn').forEach(btn => {
        btn.onclick = () => { const txid = btn.getAttribute('data-txid'); if(returnBook(txid)) renderPage('transactions'); else alert("Error"); };
      });
    }
    if(page === 'home') {
      const exploreBtn = document.getElementById('exploreBtn');
      if(exploreBtn) exploreBtn.onclick = (e) => { e.preventDefault(); setPage('catalog'); };
    }
  }

  function showIssueForBook(bookId) {
    setPage('transactions');
    setTimeout(() => {
      const bookSelect = document.getElementById('issueBookSelect');
      if(bookSelect) bookSelect.value = bookId;
      const msgDiv = document.getElementById('issueMessage');
      if(msgDiv) msgDiv.innerHTML = '<span style="color:#2C7DA0;">Book preselected — choose member & due date then click Issue</span>';
    }, 80);
  }

  function setPage(page) {
    currentPage = page;
    renderPage(page);
  }

  // navigation event listener
  function initNav() {
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const page = link.getAttribute('data-page');
        if(page) setPage(page);
      });
    });
  }

  loadData();
  syncAvailability();
  initNav();
  setPage('home');
</script>
</body>
</html>
